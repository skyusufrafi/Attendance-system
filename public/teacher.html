<!DOCTYPE html>
<html>
<head>
    <title>Teacher Admin</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf-plugin-autotable.min.js"></script>
</head>
<body>
    <div id="login-box" class="container card-small">
        <h2>Secure Login</h2>
        <input type="password" id="t-code" placeholder="Enter Code (2404)">
        <button onclick="login()">Enter</button>
    </div>

    <div id="dash" class="container" style="display:none;">
        <div class="tabs">
            <button onclick="showTab('live')">Live</button>
            <button onclick="showTab('history')">History</button>
        </div>

        <div id="live-tab" class="grid">
            <div class="card">
                <h3>Start Session</h3>
                <input type="text" id="lec" placeholder="Lecture Title">
                <button onclick="startSession()">Generate QR</button>
                <div id="qr-display" style="margin-top:15px;"></div>
            </div>
            <div class="card">
                <h3>Attendance List</h3>
                <table>
                    <thead><tr><th>Name</th><th>ID</th><th>Distance</th></tr></thead>
                    <tbody id="list-body"></tbody>
                </table>
            </div>
        </div>

        <div id="history-tab" style="display:none;">
            <h3>Past Lectures</h3>
            <div id="hist-container"></div>
        </div>
    </div>

    <script>
        let currentSid = "";
        function login() {
            if(document.getElementById('t-code').value === "2404") {
                document.getElementById('login-box').style.display='none';
                document.getElementById('dash').style.display='block';
                loadHistory();
            } else { alert("Access Denied"); }
        }

        function showTab(t) {
            document.getElementById('live-tab').style.display = t==='live' ? 'grid' : 'none';
            document.getElementById('history-tab').style.display = t==='history' ? 'block' : 'none';
        }

        async function startSession() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch('/api/generate-session', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        lectureName: document.getElementById('lec').value,
                        location: { lat: pos.coords.latitude, lng: pos.coords.longitude }
                    })
                });
                const data = await res.json();
                currentSid = data.sessionId;
                document.getElementById('qr-display').innerHTML = `<img src="${data.qrData}" width="200">`;
                setInterval(refreshList, 3000);
            });
        }

        async function refreshList() {
            const res = await fetch('/api/attendance/' + currentSid);
            const data = await res.json();
            document.getElementById('list-body').innerHTML = data.map(r => `
                <tr style="color:${r.distanceFromTeacher > 50 ? 'red' : 'green'}">
                    <td>${r.studentName}</td><td>${r.studentId}</td><td>${r.distanceFromTeacher}m</td>
                </tr>`).join('');
        }

        async function loadHistory() {
            const res = await fetch('/api/history');
            const data = await res.json();
            document.getElementById('hist-container').innerHTML = data.map(s => `
                <div class="card" style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>${s.lectureName} (${new Date(s.createdAt).toLocaleDateString()})</span>
                    <button onclick="downloadPDF('${s.uniqueId}', '${s.lectureName}')" style="width:auto;">PDF</button>
                </div>
            `).join('');
        }

        async function downloadPDF(sid, name) {
            const res = await fetch('/api/attendance/' + sid);
            const data = await res.json();
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text(`Report: ${name}`, 14, 15);
            doc.autoTable({ head: [['Name', 'ID', 'Distance']], body: data.map(r => [r.studentName, r.studentId, r.distanceFromTeacher+'m']) });
            doc.save(`${name}.pdf`);
        }
    </script>
</body>
</html>
