<!DOCTYPE html>
<html>
<head>
    <title>Smart Attendance | Teacher</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf-plugin-autotable.min.js"></script>
</head>
<body>
    <div id="auth-box" class="container card-small">
        <h2>Teacher Login</h2>
        <input type="text" id="t-name" placeholder="Full Name">
        <input type="password" id="t-code" placeholder="Secret Code">
        <button onclick="login()">Enter Dashboard</button>
    </div>

    <div id="dash" class="container" style="display:none;">
        <header>
            <h2 id="greet"></h2>
            <button onclick="location.reload()" class="btn-red">Logout</button>
        </header>
        
        <div class="grid">
            <div class="card">
                <h3>New Lecture</h3>
                <input type="text" id="lec-name" placeholder="e.g. Computer Science">
                <select id="lec-dur"><option value="1">1 Hour</option><option value="2">2 Hours</option></select>
                <button onclick="startSession()" id="gen-btn">Generate QR</button>
                <div id="qr-area"></div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between;">
                    <h3>Attendance List</h3>
                    <button onclick="downloadPDF()" id="pdf-btn" style="display:none; width:auto;">PDF</button>
                </div>
                <table id="att-table">
                    <thead><tr><th>Name</th><th>ID</th><th>Distance</th><th>Time</th></tr></thead>
                    <tbody id="list-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let teacher = null; let currentSid = null;

        function login() {
            teacher = document.getElementById('t-name').value;
            if(teacher && document.getElementById('t-code').value) {
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('dash').style.display = 'block';
                document.getElementById('greet').innerText = "Prof. " + teacher;
            }
        }

        async function startSession() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch('/api/generate-session', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        teacherName: teacher,
                        lectureName: document.getElementById('lec-name').value,
                        duration: document.getElementById('lec-dur').value,
                        location: { lat: pos.coords.latitude, lng: pos.coords.longitude }
                    })
                });
                const data = await res.json();
                currentSid = data.sessionId;
                document.getElementById('qr-area').innerHTML = `<img src="${data.qrData}" width="200">`;
                document.getElementById('pdf-btn').style.display = 'block';
                setInterval(fetchList, 3000);
            });
        }

        async function fetchList() {
            const res = await fetch('/api/attendance/' + currentSid);
            const data = await res.json();
            document.getElementById('list-body').innerHTML = data.map(r => `
                <tr style="color:${r.distanceFromTeacher > 50 ? 'red' : 'green'}">
                    <td>${r.studentName}</td><td>${r.studentId}</td>
                    <td>${r.distanceFromTeacher}m</td><td>${new Date(r.timestamp).toLocaleTimeString()}</td>
                </tr>`).join('');
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text(`Attendance: ${document.getElementById('lec-name').value}`, 14, 15);
            doc.autoTable({ html: '#att-table', marginTop: 20 });
            doc.save('attendance.pdf');
        }
    </script>
</body>
</html>
