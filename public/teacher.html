<!DOCTYPE html>
<html>
<head>
    <title>AIKTC | Faculty Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf-plugin-autotable.min.js"></script>
</head>
<body>
    <div id="t-auth" class="glass-container">
        <h2 id="t-title">Faculty Login</h2>
        <div id="t-login-box">
            <input type="email" id="tl-email" placeholder="Faculty Email">
            <input type="password" id="tl-pass" placeholder="Password">
            <button class="primary-btn" onclick="login()">Login</button>
            <p onclick="toggle(true)">Register Account</p>
        </div>
        <div id="t-reg-box" style="display:none">
            <input type="text" id="tr-name" placeholder="Full Name">
            <input type="text" id="tr-dept" placeholder="Department">
            <input type="email" id="tr-email" placeholder="Email">
            <input type="password" id="tr-pass" placeholder="Password">
            <input type="password" id="tr-code" placeholder="Secret Code (2404)">
            <button class="primary-btn" onclick="signup()">Signup</button>
            <p onclick="toggle(false)">Back to Login</p>
        </div>
    </div>

    <div id="t-dash" class="main-layout" style="display:none">
        <div class="sidebar">
            <h2 id="user-name">Prof.</h2>
            <p id="user-dept"></p>
            <button class="primary-btn" onclick="show('live')">Live Session</button>
            <button class="primary-btn" onclick="show('hist')">History</button>
            <button class="primary-btn" style="background:#d63031" onclick="location.reload()">Logout</button>
        </div>
        <div class="content">
            <div id="live-view">
                <div class="glass-card">
                    <h3>New Lecture</h3>
                    <input type="text" id="lec-name" placeholder="Subject Name">
                    <button class="primary-btn" onclick="start()">Start QR</button>
                    <div id="qr-area" style="margin-top:20px"></div>
                </div>
                <div class="glass-card">
                    <h3>Real-time Attendance</h3>
                    <table id="live-table"><thead><tr><th>Name</th><th>Roll</th><th>Dist</th></tr></thead><tbody id="live-body"></tbody></table>
                </div>
            </div>
            <div id="hist-view" style="display:none">
                <h2>Past Lectures</h2>
                <div id="hist-list"></div>
            </div>
        </div>
    </div>

    <script>
        let prof = null; let sid = "";
        function toggle(r){ document.getElementById('t-login-box').style.display=r?'none':'block'; document.getElementById('t-reg-box').style.display=r?'block':'none'; }
        async function signup(){
            const res = await fetch('/api/teacher-signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fullName:document.getElementById('tr-name').value,department:document.getElementById('tr-dept').value,email:document.getElementById('tr-email').value,password:document.getElementById('tr-pass').value,secretCode:document.getElementById('tr-code').value})});
            if(res.ok){alert("Success"); toggle(false);} else alert("Invalid Code");
        }
        async function login(){
            const res = await fetch('/api/teacher-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('tl-email').value,pass:document.getElementById('tl-pass').value})});
            if(res.ok){ prof = await res.json(); document.getElementById('t-auth').style.display='none'; document.getElementById('t-dash').style.display='flex'; document.getElementById('user-name').innerText=prof.fullName; document.getElementById('user-dept').innerText=prof.department; loadHist();}
        }
        function show(v){ document.getElementById('live-view').style.display=v==='live'?'block':'none'; document.getElementById('hist-view').style.display=v==='hist'?'block':'none'; }
        async function start(){
            navigator.geolocation.getCurrentPosition(async p=>{
                const res = await fetch('/api/generate-session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({teacherEmail:prof.email,lectureName:document.getElementById('lec-name').value,location:{lat:p.coords.latitude,lng:p.coords.longitude}})});
                const d = await res.json(); sid = d.uniqueId; document.getElementById('qr-area').innerHTML = `<img src="${d.qr}" width="200">`;
                setInterval(refresh, 3000);
            });
        }
        async function refreshLive() {
    const res = await fetch('/api/attendance/' + sid);
    const d = await res.json();
    
    // Create a Map to store only the most recent entry per Student ID
    const uniqueRecords = new Map();
    d.forEach(record => {
        uniqueRecords.set(record.studentId, record);
    });

    document.getElementById('live-body').innerHTML = Array.from(uniqueRecords.values()).map(r => `
        <tr style="color:${r.distanceFromTeacher > 50 ? '#ff4757' : '#00ff88'}">
            <td>${r.studentName}</td>
            <td>${r.studentId}</td>
            <td>${r.distanceFromTeacher}m</td>
        </tr>`).join('');
}
        async function loadHist(){
            const res = await fetch('/api/history/'+prof.email); const d = await res.json();
            document.getElementById('hist-list').innerHTML = d.map(s=>`<div class="glass-card"><b>${s.lectureName}</b> (${new Date(s.createdAt).toLocaleDateString()}) <button onclick="download('${s.uniqueId}')">PDF</button></div>`).join('');
        }
        async function download(id){
            const res = await fetch('/api/attendance/'+id); const d = await res.json();
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.text("Attendance Report", 14, 15);
            doc.autoTable({head:[['Name','Roll','Distance']], body:d.map(r=>[r.studentName, r.studentId, r.distanceFromTeacher+'m'])});
            doc.save("Report.pdf");
        }
    </script>
</body>
</html>
