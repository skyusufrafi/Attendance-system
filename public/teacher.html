<!DOCTYPE html>
<html>
<head>
    <title>Teacher Admin</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf-plugin-autotable.min.js"></script>
</head>
<body>
    <div id="login-box" class="container card-small">
        <h2>Teacher Login</h2>
        <input type="text" id="t-user" placeholder="Name">
        <input type="password" id="t-pass" placeholder="Password">
        <input type="password" id="t-secret" placeholder="Secret Code (2404)">
        <button onclick="login()">Login</button>
    </div>

    <div id="dash" class="container" style="display:none;">
        <div class="tabs">
            <button onclick="showTab('live')">Live Session</button>
            <button onclick="showTab('history')">History</button>
            <button onclick="location.reload()" style="background:#ff4757">Logout</button>
        </div>

        <div id="live-tab" class="grid">
            <div class="card">
                <h3>New Lecture</h3>
                <input type="text" id="lec-title" placeholder="e.g. Math 101">
                <button onclick="startSession()">Generate QR</button>
                <div id="qr-box"></div>
            </div>
            <div class="card">
                <h3>Live List</h3>
                <table id="live-table">
                    <thead><tr><th>Name</th><th>ID</th><th>Dist</th></tr></thead>
                    <tbody id="list-body"></tbody>
                </table>
            </div>
        </div>

        <div id="history-tab" style="display:none;">
            <h3>Past Lectures</h3>
            <div id="hist-list"></div>
        </div>
    </div>

    <script>
        let user = "";
        let currentSid = "";

        async function login() {
            const res = await fetch('/api/teacher-login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('t-user').value,
                    password: document.getElementById('t-pass').value,
                    secretCode: document.getElementById('t-secret').value
                })
            });
            const data = await res.json();
            if(res.ok) {
                user = data.teacherName;
                document.getElementById('login-box').style.display='none';
                document.getElementById('dash').style.display='block';
                loadHistory();
            } else { alert(data.message); }
        }

        function showTab(t) {
            document.getElementById('live-tab').style.display = t==='live' ? 'grid' : 'none';
            document.getElementById('history-tab').style.display = t==='history' ? 'block' : 'none';
        }

        async function startSession() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch('/api/generate-session', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        teacherName: user,
                        lectureName: document.getElementById('lec-title').value,
                        location: { lat: pos.coords.latitude, lng: pos.coords.longitude }
                    })
                });
                const data = await res.json();
                currentSid = data.sessionId;
                document.getElementById('qr-box').innerHTML = `<img src="${data.qrData}" width="200">`;
                setInterval(refreshList, 3000);
            });
        }

        async function refreshList() {
            const res = await fetch('/api/attendance/' + currentSid);
            const data = await res.json();
            document.getElementById('list-body').innerHTML = data.map(r => `
                <tr style="color:${r.distanceFromTeacher > 50 ? 'red' : 'green'}">
                    <td>${r.studentName}</td><td>${r.studentId}</td><td>${r.distanceFromTeacher}m</td>
                </tr>`).join('');
        }

        async function loadHistory() {
            const res = await fetch('/api/history/' + user);
            const data = await res.json();
            document.getElementById('hist-list').innerHTML = data.map(s => `
                <div class="card" style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span><b>${s.lectureName}</b> (${new Date(s.createdAt).toLocaleDateString()})</span>
                    <button onclick="downloadPDF('${s.uniqueId}', '${s.lectureName}')" style="width:auto;">Download PDF</button>
                </div>
            `).join('');
        }

        async function downloadPDF(sid, name) {
            const res = await fetch('/api/attendance/' + sid);
            const data = await res.json();
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text(`Report: ${name}`, 14, 15);
            doc.autoTable({ head: [['Name', 'ID', 'Distance']], body: data.map(r => [r.studentName, r.studentId, r.distanceFromTeacher+'m']) });
            doc.save(`${name}.pdf`);
        }
    </script>
</body>
</html>
