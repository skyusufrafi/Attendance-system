<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Portal | Smart Attendance</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="container card-small">
        <h2>Student Attendance</h2>
        <div id="reader" style="width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 15px;"></div>
        
        <input type="text" id="s-name" placeholder="Full Name">
        <input type="text" id="s-id" placeholder="Student Roll No / ID">
        <input type="text" id="s-session" placeholder="Scanned Session ID" readonly>
        
        <button onclick="submitAttendance()" id="sub-btn">Submit Attendance</button>
        <p id="msg" style="margin-top: 15px; font-weight: bold;"></p>
    </div>

    <script>
        let studentLoc = null;

        // 1. Initialize QR Scanner
        const html5QrCode = new Html5Qrcode("reader");
        const qrConfig = { fps: 10, qrbox: { width: 250, height: 250 } };

        html5QrCode.start({ facingMode: "environment" }, qrConfig, (decodedText) => {
            document.getElementById('s-session').value = decodedText;
            document.getElementById('msg').innerText = "QR Scanned Successfully!";
            document.getElementById('msg').style.color = "green";
        });

        // 2. Get Student Location
        function getLocation() {
            return new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(
                    pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                    err => {
                        alert("Please allow location access to mark attendance.");
                        reject(err);
                    }
                );
            });
        }

        // 3. Submit Data
        async function submitAttendance() {
            const name = document.getElementById('s-name').value;
            const id = document.getElementById('s-id').value;
            const sid = document.getElementById('s-session').value;
            const btn = document.getElementById('sub-btn');

            if (!name || !id || !sid) return alert("Please fill all fields and scan QR");

            btn.disabled = true;
            btn.innerText = "Checking Location...";

            try {
                const loc = await getLocation();
                const res = await fetch('/api/submit-attendance', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        studentName: name,
                        studentId: id,
                        sessionId: sid,
                        location: loc
                    })
                });

                const data = await res.json();
                const msg = document.getElementById('msg');
                
                if (res.ok) {
                    msg.innerText = `Attendance Marked! Distance: ${data.distance}m`;
                    msg.style.color = data.distance > 50 ? "orange" : "green";
                    if(data.distance > 50) alert("Warning: You are quite far from the teacher!");
                } else {
                    msg.innerText = data.message;
                    msg.style.color = "red";
                }
            } catch (err) {
                console.error(err);
                msg.innerText = "Error marking attendance.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Submit Attendance";
            }
        }
    </script>
</body>
</html>
