<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Attendance | Smart System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container card-small">
        <h2>Student Attendance</h2>
        <p class="subtitle">Please enter your details and allow location access.</p>
        
        <div id="form-div">
            <div class="input-group">
                <input type="text" id="s-name" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <input type="text" id="s-id" placeholder="Student ID Number" required>
            </div>
            <div class="input-group">
                <input type="text" id="s-session" placeholder="Session ID (from QR)" required>
            </div>
            
            <button onclick="submitAttendance()" id="sub-btn">Submit Attendance</button>
        </div>

        <div id="status-container">
            <p id="msg"></p>
            <p id="dist-info"></p>
        </div>
    </div>

    <script>
        // Generates a unique digital signature for this specific phone/browser
        function getFingerprint() {
            const info = navigator.userAgent + screen.width + navigator.language;
            return btoa(info); 
        }

        async function submitAttendance() {
            const btn = document.getElementById('sub-btn');
            const msg = document.getElementById('msg');
            const distInfo = document.getElementById('dist-info');
            
            const name = document.getElementById('s-name').value;
            const id = document.getElementById('s-id').value;
            const sid = document.getElementById('s-session').value;

            if (!name || !id || !sid) {
                alert("Please fill in all fields.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processing...";
            msg.innerText = "Requesting GPS location...";

            // Capture GPS Coordinates
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const response = await fetch('/api/submit-attendance', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            studentName: name,
                            studentId: id,
                            sessionId: sid,
                            fingerprint: getFingerprint(),
                            location: {
                                lat: pos.coords.latitude,
                                lng: pos.coords.longitude
                            }
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        msg.style.color = "#27ae60";
                        msg.innerText = "✅ Attendance Marked Successfully!";
                        distInfo.innerText = `Distance from teacher: ${data.distance} meters`;
                        document.getElementById('form-div').style.display = 'none';
                    } else {
                        // Handles "Already Marked", "Proxy Alert", or "Invalid Session"
                        throw new Error(data.message || "Server Error");
                    }
                } catch (err) {
                    msg.style.color = "#e74c3c";
                    msg.innerText = "Error: " + err.message;
                    btn.disabled = false;
                    btn.innerText = "Retry Submission";
                }
            }, (err) => {
                msg.style.color = "#e74c3c";
                msg.innerText = "Location access denied. Please enable GPS and try again.";
                btn.disabled = false;
                btn.innerText = "Retry Submission";
            }, {
                enableHighAccuracy: true,
                timeout: 5000,
                maximumAge: 0
            });
        }
    </script>
</body>
</html>
