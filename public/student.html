<!DOCTYPE html>
<html>
<head>
    <title>Student Attendance</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="container card-small">
        <div id="reader"></div>
        <input type="text" id="s-name" placeholder="Full Name">
        <input type="text" id="s-id" placeholder="ID Number">
        <input type="text" id="s-sid" placeholder="QR Session ID">
        <button onclick="submit()">Mark Attendance</button>
        <p id="msg"></p>
    </div>

    <script>
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (id) => {
            document.getElementById('s-sid').value = id;
        });

        async function submit() {
            const fingerprint = btoa(navigator.userAgent + screen.width);
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch('/api/submit-attendance', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        studentName: document.getElementById('s-name').value,
                        studentId: document.getElementById('s-id').value,
                        sessionId: document.getElementById('s-sid').value,
                        fingerprint: fingerprint,
                        location: { lat: pos.coords.latitude, lng: pos.coords.longitude }
                    })
                });
                const data = await res.json();
                document.getElementById('msg').innerText = data.message;
                document.getElementById('msg').style.color = res.ok ? "green" : "red";
            });
        }
    </script>
</body>
</html>
