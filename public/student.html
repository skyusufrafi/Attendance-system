<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="container card-small">
        <h2>Scan QR Code</h2>
        
        <div id="reader" style="width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 10px;"></div>
        
        <div id="input-fields">
            <input type="text" id="s-name" placeholder="Full Name">
            <input type="text" id="s-id" placeholder="Student ID">
            <input type="text" id="s-session" placeholder="Session ID (Auto-fills)">
            <button id="sub-btn" onclick="submitAttendance()">Submit Attendance</button>
        </div>
        <p id="status-msg"></p>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");

        // Start Camera Function
        const startScanner = () => {
            html5QrCode.start(
                { facingMode: "environment" }, // Rear camera
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    document.getElementById('s-session').value = decodedText;
                    // Vibrate on success
                    if (navigator.vibrate) navigator.vibrate(100);
                }
            ).catch(err => {
                console.error("Camera Error:", err);
                document.getElementById('status-msg').innerText = "Camera failed: Try opening in Chrome/Safari.";
            });
        };

        // Auto-start on load
        window.onload = startScanner;

        function getFingerprint() {
            return btoa(navigator.userAgent + screen.width + navigator.language);
        }

        async function submitAttendance() {
            const btn = document.getElementById('sub-btn');
            const msg = document.getElementById('status-msg');
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch('/api/submit-attendance', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        studentName: document.getElementById('s-name').value,
                        studentId: document.getElementById('s-id').value,
                        sessionId: document.getElementById('s-session').value,
                        fingerprint: getFingerprint(),
                        location: { lat: pos.coords.latitude, lng: pos.coords.longitude }
                    })
                });
                const data = await res.json();
                msg.innerText = data.message;
                msg.style.color = res.ok ? "green" : "red";
                if(res.ok) {
                    html5QrCode.stop(); // Stop camera on success
                    document.getElementById('input-fields').style.display = 'none';
                }
            }, () => alert("GPS required for attendance!"));
        }
    </script>
</body>
</html>
