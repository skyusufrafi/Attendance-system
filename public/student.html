<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Check-In</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="center-content">
    <div class="glass-container student-card">
        <h2>Attendance Check-In</h2>
        <div id="reader" class="scanner-window"></div>
        <div class="form-group">
            <input type="text" id="s-name" placeholder="Full Name">
            <input type="text" id="s-id" placeholder="University ID">
            <input type="text" id="s-sid" placeholder="QR Session ID" readonly>
        </div>
        <button class="primary-btn" onclick="submit()">Verify & Submit</button>
        <p id="msg" class="status-text"></p>
    </div>

    <script>
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 200 }, (id) => {
            document.getElementById('s-sid').value = id;
            if (navigator.vibrate) navigator.vibrate(50);
        });

        async function submit() {
            const btn = document.querySelector('button');
            btn.innerText = "Processing...";
            const fingerprint = btoa(navigator.userAgent + screen.width + navigator.language);
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch('/api/submit-attendance', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        studentName: document.getElementById('s-name').value,
                        studentId: document.getElementById('s-id').value,
                        sessionId: document.getElementById('s-sid').value,
                        fingerprint: fingerprint,
                        location: { lat: pos.coords.latitude, lng: pos.coords.longitude }
                    })
                });
                const data = await res.json();
                const msg = document.getElementById('msg');
                msg.innerText = data.message;
                msg.style.color = res.ok ? "#00ff88" : "#ff4757";
                btn.innerText = "Verify & Submit";
            }, () => alert("GPS is required for verification!"));
        }
    </script>
</body>
</html>
